name: Daily Commit Automation

on:
  schedule:
    - cron: "0 1 * * *" # Runs every day at 01:00 UTC (06:30 IST) - Best for GitHub streak attribution
    - cron: "0 13 * * *" # Backup run 12 hours later
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Daily Commit Script
        run: |
          git config --global user.name "AgamArora20"
          git config --global user.email "agamarora91@gmail.com"
          node dailyCommit.js
          
      - name: Success Check
        run: |
          echo "Commit and Push completed."
          node checkToday.js
